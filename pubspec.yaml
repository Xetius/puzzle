name: puzzle
description: A puzzle game for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.4

  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#1a1a2e"
  image: android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
  android_12:
    color: "#1a1a2e"
    icon_background_color: "#1a1a2e"
    image: android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

flutter:
  uses-material-design: true

  assets:
    - assets/
